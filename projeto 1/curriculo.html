<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Currículo - Seu Nome</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f0f0f0;
        }

        .container {
            display: flex;
            max-width: 900px;
            margin: 40px auto;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }

        .lado-esquerdo {
            width: 35%;
            background: #2c3e50;
            color: white;
            padding: 20px;
        }

        .lado-direito {
            width: 65%;
            padding: 20px;
        }

        h1 {
            margin-top: 0;
        }

        h2 {
            border-bottom: 2px solid #ccc;
            padding-bottom: 5px;
        }

        .info {
            margin-bottom: 20px;
        }

        ul {
            padding-left: 20px;
        }

        img {
            width: 100%;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- LADO ESQUERDO -->
    <div class="lado-esquerdo">
        <img src="sua-foto.jpg" alt="Foto">

        <h1>Seu Nome</h1>

        <div class="info">
            <p>Email: seuemail@email.com</p>
            <p>Telefone: (00) 00000-0000</p>
        </div>

        <h2>Habilidades</h2>
        <ul>
            <li>Comunicação</li>
            <li>Trabalho em equipe</li>
            <li>Informática</li>
        </ul>
    </div>

    <!-- LADO DIREITO -->
    <div class="lado-direito">

        <h2>Objetivo</h2>
        <p>Descreva aqui seu objetivo profissional.</p>

        <h2>Experiência</h2>
        <p><strong>Empresa XYZ</strong> - Cargo</p>
        <p>Descreva o que você fazia.</p>

        <h2>Formação</h2>
        <p>Curso - Instituição</p>

    </div>

</div>

</body>
</html>
